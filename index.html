<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#F5F0E8">
<title>Mon Journal</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --sand:#F5F0E8;--sand-dark:#EDE6D6;--sand-deeper:#D9CEB8;
  --sage:#8A9E8C;--sage-light:#B5C4B1;--sage-pale:#E8EEE7;
  --text:#3D3530;--text-light:#8A7E74;--text-xlight:#B5ADA5;
  --accent:#C4956A;--accent-pale:#F0E4D4;--white:#FDFAF5;
  --radius:16px;--radius-sm:10px;
  --red:#E07070;--red-pale:#FAEAEA;
  --orange:#E0A050;--orange-pale:#FDF3E3;
  --green:#7AAE7C;--green-pale:#EAF4EA;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--sand);font-family:'DM Sans',sans-serif;color:var(--text);min-height:100vh;max-width:430px;margin:0 auto;}

/* HEADER */
.header{background:var(--white);padding:48px 20px 14px;border-bottom:1px solid var(--sand-deeper);position:sticky;top:0;z-index:100;}
.header-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;gap:12px;}
.day-name{font-size:10px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--text-xlight);margin-bottom:2px;}
.day-number{font-family:'Playfair Display',serif;font-size:38px;line-height:1;color:var(--text);}
.month-year{font-size:12px;color:var(--text-light);margin-top:3px;font-weight:300;}
.garde-pill{display:inline-block;margin-top:6px;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:500;}
.garde-pill.ma{background:var(--sage-pale);color:var(--sage);border:1px solid var(--sage-light);}
.garde-pill.papa{background:var(--accent-pale);color:var(--accent);border:1px solid #DDB890;}

/* MINI CAL */
.mini-cal{background:var(--sand);border-radius:12px;padding:10px;min-width:148px;}
.mini-cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.mini-cal-month{font-size:11px;font-weight:500;color:var(--text-light);}
.mini-cal-nav{display:flex;gap:2px;}
.mini-cal-nav button{width:20px;height:20px;border:none;background:transparent;cursor:pointer;font-size:12px;color:var(--text-xlight);border-radius:4px;display:flex;align-items:center;justify-content:center;padding:0;}
.mini-cal-nav button:active{background:var(--sand-deeper);}
.mini-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;}
.mc-head{font-size:8px;font-weight:500;text-transform:uppercase;color:var(--text-xlight);text-align:center;padding:2px 0;}
.mc-day{font-size:10px;text-align:center;padding:3px 1px;border-radius:4px;cursor:pointer;color:var(--text-light);line-height:1.4;position:relative;}
.mc-day.other-month{color:var(--text-xlight);}
.mc-day.garde-alex{background:var(--sage-pale);}
.mc-day.garde-papa{background:var(--accent-pale);}
.mc-day.today{background:var(--text)!important;color:white!important;border-radius:50%;font-weight:600;}
.mc-day.selected:not(.today){background:var(--sage)!important;color:white!important;border-radius:50%;}
.mc-day.has-entry::after{content:'';position:absolute;bottom:1px;left:50%;transform:translateX(-50%);width:3px;height:3px;border-radius:50%;background:var(--sage);}
.mc-day.today.has-entry::after,.mc-day.selected.has-entry::after{background:var(--sage-light);}

/* NAV DAYS */
.nav-days{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;}
.nav-days::-webkit-scrollbar{display:none;}
.nav-day{display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 9px;border-radius:var(--radius-sm);cursor:pointer;flex-shrink:0;border:none;background:transparent;transition:all 0.2s;}
.nav-day .dl{font-size:9px;font-weight:500;letter-spacing:1px;text-transform:uppercase;color:var(--text-xlight);}
.nav-day .dn{font-size:15px;color:var(--text-light);}
.nav-day .dd{width:4px;height:4px;border-radius:50%;background:transparent;margin:0 auto;}
.nav-day.active{background:var(--text);}
.nav-day.active .dl,.nav-day.active .dn{color:var(--white);}
.nav-day.has-entry .dd{background:var(--sage);}
.nav-day.active.has-entry .dd{background:var(--sage-light);}

/* MAIN */
.main{padding:18px 18px 120px;display:flex;flex-direction:column;gap:16px;}
.page{display:none;flex-direction:column;gap:16px;}
.page.active{display:flex;}

/* CARD */
.card{background:var(--white);border-radius:var(--radius);padding:18px;box-shadow:0 1px 4px rgba(61,53,48,0.07);animation:fadeIn 0.25s ease;}
.card-label{font-size:10px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--text-xlight);margin-bottom:12px;}
.hint{font-size:9px;color:var(--text-xlight);margin-left:6px;font-weight:400;letter-spacing:0;}

/* AGENDA */
.agenda-item{display:flex;align-items:baseline;gap:10px;padding:8px 0;border-bottom:1px solid var(--sand-dark);}
.agenda-item:last-child{border-bottom:none;padding-bottom:0;}
.agenda-time{font-size:11px;font-weight:500;color:var(--sage);min-width:70px;flex-shrink:0;}
.agenda-title{font-size:13px;color:var(--text);line-height:1.4;}

/* TÂCHES */
.tasks-list{display:flex;flex-direction:column;gap:7px;}
.task-item{display:flex;align-items:flex-start;gap:10px;padding:11px 13px;border-radius:var(--radius-sm);cursor:pointer;border-left:3px solid transparent;user-select:none;}
.task-item.prio-red{background:var(--red-pale);border-left-color:var(--red);}
.task-item.prio-orange{background:var(--orange-pale);border-left-color:var(--orange);}
.task-item.prio-green{background:var(--green-pale);border-left-color:var(--green);}
.task-circle{width:19px;height:19px;border-radius:50%;border:1.5px solid var(--sand-deeper);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;background:white;transition:all 0.2s;}
.task-circle.done{background:var(--sage);border-color:var(--sage);}
.task-circle.done::after{content:'✓';font-size:10px;color:white;font-weight:700;}
.task-text{font-size:13px;color:var(--text);line-height:1.4;flex:1;}
.task-item.done-task .task-text{text-decoration:line-through;color:var(--text-xlight);}
.task-date-label{font-size:10px;color:var(--text-xlight);margin-top:2px;}

/* ADD TASK */
.add-task-card{background:var(--white);border-radius:var(--radius);padding:15px 18px;box-shadow:0 1px 4px rgba(61,53,48,0.07);}
.add-task-row{display:flex;align-items:center;gap:8px;padding:9px 13px;border:1.5px dashed var(--sand-deeper);border-radius:var(--radius-sm);}
.add-task-input{flex:1;border:none;background:transparent;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);outline:none;}
.add-task-input::placeholder{color:var(--text-xlight);}
.add-prio-row{display:flex;align-items:center;gap:8px;margin-top:9px;}
.add-prio-label{font-size:11px;color:var(--text-xlight);}
.prio-dot{width:20px;height:20px;border-radius:50%;cursor:pointer;transition:all 0.15s;flex-shrink:0;}
.prio-dot.red{background:var(--red);}
.prio-dot.orange{background:var(--orange);}
.prio-dot.green{background:var(--green);}
.prio-dot.selected{box-shadow:0 0 0 2px white,0 0 0 4px var(--sand-deeper);transform:scale(1.15);}
.prio-dot.red.selected{box-shadow:0 0 0 2px white,0 0 0 4px var(--red);}
.prio-dot.orange.selected{box-shadow:0 0 0 2px white,0 0 0 4px var(--orange);}
.prio-dot.green.selected{box-shadow:0 0 0 2px white,0 0 0 4px var(--green);}
.prio-text{font-size:11px;color:var(--text-xlight);}
.confirm-btn{width:100%;margin-top:10px;padding:11px;background:var(--text);color:white;border:none;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;}
.confirm-btn:active{opacity:0.85;}

/* DATE PICKER TÂCHE */
.date-picker-row{display:flex;align-items:center;gap:8px;margin-top:9px;}
.date-picker-label{font-size:11px;color:var(--text-xlight);}
.date-picker-input{flex:1;padding:7px 10px;background:var(--sand);border-radius:var(--radius-sm);border:none;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--text);outline:none;}

/* TRACKERS COMPACTS */
.trackers-compact{background:var(--white);border-radius:var(--radius);padding:16px 18px;box-shadow:0 1px 4px rgba(61,53,48,0.07);}
.tc-row{display:flex;align-items:flex-start;gap:14px;margin-bottom:12px;}
.tc-row:last-child{margin-bottom:0;}
.tc-block{flex:1;min-width:0;}
.tc-sep{width:1px;background:var(--sand-deeper);align-self:stretch;margin-top:2px;}
.tc-header{display:flex;align-items:center;gap:6px;margin-bottom:7px;}
.tc-name{font-size:11px;color:var(--text-xlight);flex:1;}
.tc-val{font-family:'Playfair Display',serif;font-size:14px;color:var(--text);}
.tc-water{display:flex;align-items:center;gap:5px;}
.water-btn{width:22px;height:22px;border-radius:50%;border:1px solid var(--sand-deeper);background:var(--white);font-size:14px;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;}
.water-btn:active{background:var(--sand-deeper);}
.water-glasses{display:flex;gap:2px;flex-wrap:wrap;flex:1;}
.glass{font-size:11px;filter:grayscale(1) opacity(0.3);}
.glass.filled{filter:none;}
.tc-row-toggles{gap:0;background:var(--sand);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:0;}
.tc-toggle-item{flex:1;display:flex;align-items:center;gap:7px;}
.tc-toggle-item+.tc-toggle-item{border-left:1px solid var(--sand-deeper);padding-left:12px;}
.toggle-btn-sm{margin-left:auto;width:26px;height:26px;border-radius:50%;border:1.5px solid var(--sand-deeper);background:var(--white);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-xlight);transition:all 0.2s;flex-shrink:0;}
.toggle-btn-sm.done{background:var(--sage);border-color:var(--sage);color:white;font-size:11px;}
input[type=range]{-webkit-appearance:none;width:100%;height:4px;border-radius:2px;background:var(--sand-deeper);outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--text);cursor:pointer;}

/* PAGE TÂCHES */
.tasks-filter{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.filter-btn{padding:5px 12px;border-radius:20px;border:1.5px solid var(--sand-deeper);background:transparent;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;color:var(--text-light);cursor:pointer;transition:all 0.15s;}
.filter-btn.active{background:var(--text);border-color:var(--text);color:white;}
.filter-btn.red.active{background:var(--red);border-color:var(--red);}
.filter-btn.orange.active{background:var(--orange);border-color:var(--orange);}
.filter-btn.green.active{background:var(--green);border-color:var(--green);}
.tasks-section-title{font-size:12px;font-weight:500;color:var(--text-light);margin:14px 0 8px;display:flex;align-items:center;gap:6px;}
.empty-state{text-align:center;padding:30px 0;color:var(--text-xlight);font-size:13px;}

/* TRACKER PAGE */
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-top:4px;}
.wg-header{text-align:center;font-size:8px;font-weight:500;letter-spacing:1px;color:var(--text-xlight);text-transform:uppercase;padding-bottom:3px;}
.wg-cell{aspect-ratio:1;border-radius:5px;background:var(--sand);display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--text-light);}
.wg-cell.done{background:var(--sage);}
.wg-cell.done-text::after{content:'✓';color:white;font-weight:700;font-size:11px;}
.wg-cell.partial{background:var(--sage-light);}
.tracker-section-title{font-size:12px;font-weight:500;color:var(--text-light);margin:14px 0 7px;display:flex;align-items:center;gap:6px;}

/* PROJETS */
.proj-card{background:var(--white);border-radius:var(--radius);box-shadow:0 1px 4px rgba(61,53,48,0.07);overflow:hidden;animation:fadeIn 0.25s ease;}
.proj-card-header{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;cursor:pointer;user-select:none;}
.proj-card-left{display:flex;align-items:center;gap:10px;}
.proj-emoji{font-size:18px;}
.proj-card-title{font-family:'Playfair Display',serif;font-size:16px;color:var(--text);}
.proj-card-right{display:flex;align-items:center;gap:8px;}
.proj-count{font-size:11px;color:var(--text-xlight);background:var(--sand);padding:3px 8px;border-radius:10px;}
.proj-chevron{font-size:12px;color:var(--text-xlight);transition:transform 0.2s;}
.proj-card.open .proj-chevron{transform:rotate(180deg);}
.proj-body{display:none;padding:0 18px 16px;}
.proj-card.open .proj-body{display:block;}
.proj-items{display:flex;flex-direction:column;gap:7px;margin-bottom:10px;}
.proj-item{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--sand);border-radius:var(--radius-sm);cursor:pointer;user-select:none;}
.p-check{width:17px;height:17px;border-radius:4px;border:1.5px solid var(--sand-deeper);flex-shrink:0;display:flex;align-items:center;justify-content:center;background:white;}
.proj-item.done-p .p-check{background:var(--sage);border-color:var(--sage);}
.proj-item.done-p .p-check::after{content:'✓';font-size:9px;color:white;font-weight:700;}
.proj-item.done-p .p-text{text-decoration:line-through;color:var(--text-xlight);}
.p-text{font-size:13px;color:var(--text);flex:1;}
.add-proj-row{display:flex;gap:7px;}
.add-proj-input{flex:1;padding:9px 12px;background:var(--sand);border-radius:var(--radius-sm);border:1.5px dashed var(--sand-deeper);font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);outline:none;}
.add-proj-input::placeholder{color:var(--text-xlight);}
.add-proj-btn{padding:9px 14px;background:var(--text);color:white;border:none;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;}
.new-cat-btn{display:flex;align-items:center;gap:10px;padding:14px 18px;background:var(--white);border-radius:var(--radius);box-shadow:0 1px 4px rgba(61,53,48,0.07);border:none;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text-light);cursor:pointer;width:100%;text-align:left;}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--white);border-top:1px solid var(--sand-deeper);display:flex;padding:10px 0 26px;z-index:100;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 0;border:none;background:transparent;}
.nav-icon{font-size:21px;line-height:1;}
.nav-label{font-size:10px;font-weight:500;letter-spacing:0.5px;color:var(--text-xlight);}
.nav-item.active .nav-label{color:var(--text);}
.nav-item:not(.active) .nav-icon{filter:grayscale(0.5) opacity(0.5);}

/* MODALS */
.modal-overlay{position:fixed;inset:0;background:rgba(61,53,48,0.4);z-index:200;display:none;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--white);border-radius:20px 20px 0 0;padding:22px 20px 38px;width:100%;max-width:430px;animation:slideUp 0.25s ease;}
.modal-title{font-family:'Playfair Display',serif;font-size:18px;color:var(--text);margin-bottom:14px;}
.modal-input{width:100%;padding:11px 14px;background:var(--sand);border-radius:var(--radius-sm);border:none;font-family:'DM Sans',sans-serif;font-size:15px;color:var(--text);outline:none;margin-bottom:12px;}
.modal-emoji-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.emoji-opt{font-size:22px;padding:4px;border-radius:8px;cursor:pointer;border:2px solid transparent;}
.emoji-opt.selected{border-color:var(--sage);background:var(--sage-pale);}
.modal-prio-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.modal-actions{display:flex;flex-direction:column;gap:8px;}
.modal-btn{padding:13px;border-radius:var(--radius-sm);border:none;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;cursor:pointer;}
.modal-btn.save{background:var(--text);color:white;}
.modal-btn.delete{background:var(--red-pale);color:var(--red);}
.modal-btn.cancel{background:var(--sand);color:var(--text-light);}
.modal-btn:active{opacity:0.85;}

/* TOAST */
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:var(--white);padding:10px 20px;border-radius:20px;font-size:13px;opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap;z-index:300;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
</style>
</head>
<body>

<header class="header">
  <div class="header-top">
    <div>
      <div class="day-name" id="dayName"></div>
      <div class="day-number" id="dayNumber"></div>
      <div class="month-year" id="monthYear"></div>
      <div class="garde-pill" id="gardePill"></div>
    </div>
    <div class="mini-cal">
      <div class="mini-cal-header">
        <span class="mini-cal-month" id="calMonthLabel"></span>
        <div class="mini-cal-nav">
          <button onclick="calNav(-1)">‹</button>
          <button onclick="calNav(1)">›</button>
        </div>
      </div>
      <div class="mini-cal-grid" id="calGrid"></div>
    </div>
  </div>
  <nav class="nav-days" id="navDays"></nav>
</header>

<main class="main">

  <!-- PAGE AUJOURD'HUI -->
  <div class="page active" id="page-today">
    <div class="card">
      <div class="card-label">📅 Mon agenda</div>
      <div id="agendaList"><div style="font-size:13px;color:var(--text-xlight);">Chargement…</div></div>
    </div>
    <div class="card">
      <div class="card-label">🔴 Tâches urgentes <span class="hint">appui long = modifier</span></div>
      <div class="tasks-list" id="tasksListToday"></div>
      <div style="margin-top:10px;text-align:center;">
        <button onclick="showPage('taches',document.querySelector('[data-page=taches]'))" style="background:none;border:none;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--text-xlight);cursor:pointer;text-decoration:underline;">Voir toutes les tâches →</button>
      </div>
    </div>
    <div class="trackers-compact">
      <div class="card-label" style="padding:0 2px 10px;">Trackers du jour</div>
      <div class="tc-row">
        <div class="tc-block">
          <div class="tc-header"><span>🌙</span><span class="tc-name">Sommeil</span><span class="tc-val" id="sleepVal">7h</span></div>
          <input type="range" min="3" max="12" value="7" step="0.5" oninput="updateSleep(this.value)" id="sleepSlider">
        </div>
        <div class="tc-sep"></div>
        <div class="tc-block">
          <div class="tc-header"><span>💧</span><span class="tc-name">Eau</span></div>
          <div class="tc-water">
            <button class="water-btn" onclick="updateWater(-1)">−</button>
            <div class="water-glasses" id="waterGlasses"></div>
            <button class="water-btn" onclick="updateWater(1)">+</button>
          </div>
        </div>
      </div>
      <div class="tc-row tc-row-toggles">
        <div class="tc-toggle-item">
          <span>🏃</span><span class="tc-name">Sport 30 min</span>
          <button class="toggle-btn-sm" id="sportBtn" onclick="toggleDone('sport',this)">✗</button>
        </div>
        <div class="tc-toggle-item">
          <span>📖</span><span class="tc-name">Lecture</span>
          <button class="toggle-btn-sm" id="lectureBtn" onclick="toggleDone('lecture',this)">✗</button>
        </div>
      </div>
    </div>
  </div>

  <!-- PAGE TÂCHES -->
  <div class="page" id="page-taches">
    <div class="add-task-card">
      <div class="card-label">Nouvelle tâche</div>
      <div class="add-task-row">
        <input class="add-task-input" id="newTaskInput" placeholder="Ajouter une tâche…" onkeydown="if(event.key==='Enter') confirmAddTask()">
      </div>
      <div class="date-picker-row">
        <span class="date-picker-label">Pour le :</span>
        <input type="date" class="date-picker-input" id="taskDateInput">
      </div>
      <div class="add-prio-row">
        <span class="add-prio-label">Priorité :</span>
        <div class="prio-dot red selected" onclick="selectAddPrio('red',this)"></div>
        <div class="prio-dot orange" onclick="selectAddPrio('orange',this)"></div>
        <div class="prio-dot green" onclick="selectAddPrio('green',this)"></div>
        <span class="prio-text" id="addPrioText">Urgent</span>
      </div>
      <button class="confirm-btn" onclick="confirmAddTask()">+ Ajouter</button>
    </div>
    <div class="card">
      <div class="tasks-filter">

<script>
// ── CONFIG ──
const APPS_SCRIPT_URL='https://script.google.com/macros/s/AKfycbwZ4Yq5-eITZ85ZGQx_Pe2HMzJ6k3B6GwUjXUzCBiyNc-4SNELRK502YZcmw50jwIQB/exec';

// ── GARDE ──
const GARDE_REF=new Date(2026,5,26);
function getWeekStart(d){
  const r=new Date(d); r.setHours(0,0,0,0);
  const day=r.getDay();
  const diff=(day>=5)?(day-5):(day+2);
  r.setDate(r.getDate()-diff);
  return r;
}
function isAlexWeek(d){return Math.round((getWeekStart(d)-getWeekStart(GARDE_REF))/(7*864e5))%2===0;}

// ── DATE ──
const DL=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
const DF=['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
const MF=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
let sel=new Date(); sel.setHours(0,0,0,0);

function pad(n){return String(n).padStart(2,'0');}
function dateKey(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}

function renderHeader(){
  document.getElementById('dayName').textContent=DF[sel.getDay()];
  document.getElementById('dayNumber').textContent=sel.getDate();
  document.getElementById('monthYear').textContent=MF[sel.getMonth()].toLowerCase()+' '+sel.getFullYear();
  const p=document.getElementById('gardePill');
  if(isAlexWeek(sel)){p.textContent='🌸 Ma semaine';p.className='garde-pill ma';}
  else{p.textContent='🌿 Semaine papa';p.className='garde-pill papa';}
}

function renderNavDays(){
  const nav=document.getElementById('navDays'); nav.innerHTML='';
  const today=new Date(); today.setHours(0,0,0,0);
  for(let i=-3;i<=3;i++){
    const d=new Date(today); d.setDate(today.getDate()+i);
    const btn=document.createElement('button');
    const hasEntry=!!localStorage.getItem('tracker_'+dateKey(d));
    btn.className='nav-day'+(d.getTime()===sel.getTime()?' active':'')+(hasEntry?' has-entry':'');
    btn.innerHTML=`<span class="dl">${DL[d.getDay()]}</span><span class="dn">${d.getDate()}</span><span class="dd"></span>`;
    btn.onclick=()=>{sel=d;renderHeader();renderNavDays();renderCal();loadTrackers();loadAgenda();renderTodayTasks();};
    nav.appendChild(btn);
  }
  setTimeout(()=>{const a=nav.querySelector('.active');if(a)a.scrollIntoView({inline:'center',block:'nearest',behavior:'smooth'});},50);
}

// ── MINI CAL ──
let calYear=new Date().getFullYear(),calMonth=new Date().getMonth();
function calNav(dir){calMonth+=dir;if(calMonth>11){calMonth=0;calYear++;}if(calMonth<0){calMonth=11;calYear--;}renderCal();}
function renderCal(){
  document.getElementById('calMonthLabel').textContent=MF[calMonth]+' '+calYear;
  const grid=document.getElementById('calGrid'); grid.innerHTML='';
  ['L','M','M','J','V','S','D'].forEach(d=>{const h=document.createElement('div');h.className='mc-head';h.textContent=d;grid.appendChild(h);});
  const today=new Date(); today.setHours(0,0,0,0);
  const first=new Date(calYear,calMonth,1);
  const startDay=first.getDay()===0?6:first.getDay()-1;
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const daysInPrev=new Date(calYear,calMonth,0).getDate();
  const total=Math.ceil((startDay+daysInMonth)/7)*7;
  for(let i=0;i<total;i++){
    const cell=document.createElement('div');
    cell.className='mc-day';
    let dayNum,thisMonth=true;
    if(i<startDay){dayNum=daysInPrev-startDay+i+1;thisMonth=false;}
    else if(i>=startDay+daysInMonth){dayNum=i-startDay-daysInMonth+1;thisMonth=false;}
    else{dayNum=i-startDay+1;}
    cell.textContent=dayNum;
    if(!thisMonth){cell.classList.add('other-month');}
    else{
      const d=new Date(calYear,calMonth,dayNum);
      if(isAlexWeek(d))cell.classList.add('garde-alex'); else cell.classList.add('garde-papa');
      if(d.getTime()===today.getTime())cell.classList.add('today');
      if(d.getTime()===sel.getTime()&&d.getTime()!==today.getTime())cell.classList.add('selected');
      if(localStorage.getItem('tracker_'+dateKey(d)))cell.classList.add('has-entry');
      cell.onclick=()=>{sel=new Date(calYear,calMonth,dayNum);sel.setHours(0,0,0,0);renderHeader();renderNavDays();renderCal();loadTrackers();loadAgenda();renderTodayTasks();};
    }
    grid.appendChild(cell);
  }
}

// ── TRACKERS (clé séparée: tracker_DATE) ──
let waterCount=0,sportDone=false,lectureDone=false;

function renderWater(){
  const el=document.getElementById('waterGlasses'); el.innerHTML='';
  for(let i=0;i<8;i++){const g=document.createElement('span');g.className='glass'+(i<waterCount?' filled':'');g.textContent='💧';el.appendChild(g);}
}
function updateSleep(v){document.getElementById('sleepVal').textContent=parseFloat(v)+'h';saveTrackers();}
function updateWater(d){waterCount=Math.max(0,Math.min(8,waterCount+d));renderWater();saveTrackers();}
function toggleDone(type,btn){
  if(type==='sport'){sportDone=!sportDone;btn.textContent=sportDone?'✓':'✗';btn.classList.toggle('done',sportDone);}
  if(type==='lecture'){lectureDone=!lectureDone;btn.textContent=lectureDone?'✓':'✗';btn.classList.toggle('done',lectureDone);}
  saveTrackers();
}

function saveTrackers(){
  const data={sleep:document.getElementById('sleepSlider').value,water:waterCount,sport:sportDone,lecture:lectureDone};
  localStorage.setItem('tracker_'+dateKey(sel),JSON.stringify(data));
  // Sheets en arrière-plan
  try{
    const p=new URLSearchParams({action:'saveJournal',date:dateKey(sel),sleep:data.sleep,water:data.water,sport:data.sport,lecture:data.lecture});
    fetch(APPS_SCRIPT_URL+'?'+p.toString());
  }catch(e){}
}

function loadTrackers(){
  waterCount=0;sportDone=false;lectureDone=false;
  document.getElementById('sleepSlider').value=7;
  document.getElementById('sleepVal').textContent='7h';
  renderWater();
  document.getElementById('sportBtn').textContent='✗';document.getElementById('sportBtn').classList.remove('done');
  document.getElementById('lectureBtn').textContent='✗';document.getElementById('lectureBtn').classList.remove('done');
  // Charge depuis localStorage
  const raw=localStorage.getItem('tracker_'+dateKey(sel));
  if(raw){
    const d=JSON.parse(raw);
    if(d.sleep){document.getElementById('sleepSlider').value=d.sleep;document.getElementById('sleepVal').textContent=parseFloat(d.sleep)+'h';}
    if(d.water){waterCount=Number(d.water);renderWater();}
    if(d.sport===true||d.sport==='true'){sportDone=true;document.getElementById('sportBtn').textContent='✓';document.getElementById('sportBtn').classList.add('done');}
    if(d.lecture===true||d.lecture==='true'){lectureDone=true;document.getElementById('lectureBtn').textContent='✓';document.getElementById('lectureBtn').classList.add('done');}
  }
  // Sheets en arrière-plan
  fetch(APPS_SCRIPT_URL+'?action=getJournal&date='+dateKey(sel))
    .then(r=>r.json()).then(d=>{
      if(!d) return;
      if(d.sleep){document.getElementById('sleepSlider').value=d.sleep;document.getElementById('sleepVal').textContent=parseFloat(d.sleep)+'h';}
      if(d.water){waterCount=Number(d.water);renderWater();}
      if(d.sport==='true'||d.sport===true){sportDone=true;document.getElementById('sportBtn').textContent='✓';document.getElementById('sportBtn').classList.add('done');}
      if(d.lecture==='true'||d.lecture===true){lectureDone=true;document.getElementById('lectureBtn').textContent='✓';document.getElementById('lectureBtn').classList.add('done');}
      localStorage.setItem('tracker_'+dateKey(sel),JSON.stringify(d));
    }).catch(()=>{});
}

// ── TÂCHES (clé: tasks_ALL — toutes les tâches dans un seul tableau) ──
let allTasks=[];
let editTaskIdx=null,addPrio='red',editPrio='red',currentFilter='all';
const prioLabels={red:'Urgent',orange:'Important',green:'Peut attendre'};

function loadAllTasks(){
  const raw=localStorage.getItem('tasks_ALL');
  allTasks=raw?JSON.parse(raw):[];
}

function saveAllTasks(){
  localStorage.setItem('tasks_ALL',JSON.stringify(allTasks));
  // Sheets en arrière-plan — on sauvegarde toutes les tâches
  try{
    const tp=new URLSearchParams({action:'saveTaches',date:'all',tasks:encodeURIComponent(JSON.stringify(allTasks))});
    fetch(APPS_SCRIPT_URL+'?'+tp.toString());
  }catch(e){}
}

function selectAddPrio(p,el){
  addPrio=p;
  document.querySelectorAll('.add-prio-row .prio-dot').forEach(d=>d.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('addPrioText').textContent=prioLabels[p];
}
function selectEditPrio(p){
  editPrio=p;
  ['red','orange','green'].forEach(c=>document.getElementById('ePrio'+c.charAt(0).toUpperCase()+c.slice(1)).classList.toggle('selected',c===p));
  document.getElementById('editPrioText').textContent=prioLabels[p];
}

function confirmAddTask(){
  const input=document.getElementById('newTaskInput');
  if(!input.value.trim()) return;
  const dateInput=document.getElementById('taskDateInput').value||dateKey(sel);
  allTasks.push({text:input.value.trim(),prio:addPrio,done:false,date:dateInput});
  input.value='';
  saveAllTasks();
  renderAllTasks();
  renderTodayTasks();
  showToast('Tâche ajoutée ✓');
}

function filterTasks(f,btn){
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderAllTasks();
}

function renderAllTasks(){
  const container=document.getElementById('allTasksList'); container.innerHTML='';
  let filtered=allTasks.filter(t=>currentFilter==='all'||t.prio===currentFilter);
  if(filtered.length===0){
    container.innerHTML='<div class="empty-state">Aucune tâche ici 🌿</div>';
    return;
  }
  // Grouper par date
  const groups={};
  filtered.forEach((t,origIdx)=>{
    const d=t.date||dateKey(sel);
    if(!groups[d])groups[d]=[];
    groups[d].push({...t,origIdx:allTasks.indexOf(t)});
  });
  Object.keys(groups).sort().forEach(date=>{
    const title=document.createElement('div');
    title.className='tasks-section-title';
    const d=new Date(date+'T12:00:00');
    title.textContent=DF[d.getDay()]+' '+d.getDate()+' '+MF[d.getMonth()].toLowerCase();
    container.appendChild(title);
    const list=document.createElement('div');
    list.className='tasks-list';
    groups[date].forEach(t=>{
      const div=createTaskEl(t,t.origIdx);
      list.appendChild(div);
    });
    container.appendChild(list);
  });
}

function renderTodayTasks(){
  const container=document.getElementById('tasksListToday'); container.innerHTML='';
  const todayKey=dateKey(sel);
  const urgent=allTasks.filter(t=>t.prio==='red'&&(t.date===todayKey||!t.date)&&!t.done);
  if(urgent.length===0){
    container.innerHTML='<div style="font-size:13px;color:var(--text-xlight);padding:4px 0;">Aucune tâche urgente aujourd\'hui 🌸</div>';
    return;
  }
  urgent.forEach(t=>{
    const origIdx=allTasks.indexOf(t);
    container.appendChild(createTaskEl(t,origIdx));
  });
}

function createTaskEl(t,origIdx){
  const div=document.createElement('div');
  div.className='task-item prio-'+t.prio+(t.done?' done-task':'');
  div.innerHTML=`<div class="task-circle${t.done?' done':''}"></div><div class="task-text">${t.text}</div>`;
  div.addEventListener('click',()=>{
    allTasks[origIdx].done=!allTasks[origIdx].done;
    saveAllTasks(); renderAllTasks(); renderTodayTasks();
  });
  addLongPress(div,()=>openTaskModal(origIdx));
  return div;
}

function openTaskModal(idx){
  editTaskIdx=idx; editPrio=allTasks[idx].prio;
  document.getElementById('taskEditInput').value=allTasks[idx].text;
  selectEditPrio(editPrio);
  document.getElementById('taskModal').classList.add('open');
}
function saveTaskEdit(){
  const v=document.getElementById('taskEditInput').value.trim(); if(!v)return;
  allTasks[editTaskIdx]={...allTasks[editTaskIdx],text:v,prio:editPrio};
  closeModal('taskModal'); saveAllTasks(); renderAllTasks(); renderTodayTasks(); showToast('Modifié ✓');
}
function deleteTask(){
  allTasks.splice(editTaskIdx,1);
  closeModal('taskModal'); saveAllTasks(); renderAllTasks(); renderTodayTasks(); showToast('Supprimé');
}

// ── PROJETS ──
const DEFAULT_CATS=[
  {id:'culture',name:'Films & Livres',emoji:'🎬',fixed:true,open:false,items:[]},
  {id:'achats',name:'Achats',emoji:'🛍️',fixed:true,open:false,items:[]},
  {id:'travaux',name:'Travaux & chantiers',emoji:'🔨',fixed:true,open:false,items:[]}
];
let cats=[];
let editProjCatId=null,editProjItemIdx=null,editCatId=null,selectedEmoji='🎯';
const EMOJIS=['🎬','📚','🛍️','🔨','🌿','✈️','🎵','💄','🍽️','💪','🎨','📝','🏠','🌸','⭐','🎯'];

function loadCats(){
  const stored=localStorage.getItem('proj_cats');
  cats=stored?JSON.parse(stored):JSON.parse(JSON.stringify(DEFAULT_CATS));
  fetch(APPS_SCRIPT_URL+'?action=getProjets').then(r=>r.json()).then(d=>{
    if(d&&Array.isArray(d)&&d.length){cats=d;localStorage.setItem('proj_cats',JSON.stringify(cats));}
    renderProjs();
  }).catch(()=>renderProjs());
}

function saveCats(){
  localStorage.setItem('proj_cats',JSON.stringify(cats));
  try{const p=new URLSearchParams({action:'saveProjets',cats:encodeURIComponent(JSON.stringify(cats))});fetch(APPS_SCRIPT_URL+'?'+p.toString());}catch(e){}
}

function renderProjs(){
  const list=document.getElementById('projList'); list.innerHTML='';
  cats.forEach(cat=>{
    const remaining=cat.items.filter(i=>!i.done).length;
    const card=document.createElement('div');
    card.className='proj-card'+(cat.open?' open':'');
    const header=document.createElement('div');
    header.className='proj-card-header';
    header.innerHTML=`<div class="proj-card-left"><span class="proj-emoji">${cat.emoji}</span><span class="proj-card-title">${cat.name}</span></div><div class="proj-card-right">${remaining>0?`<span class="proj-count">${remaining}</span>`:''}<span class="proj-chevron">▼</span></div>`;
    header.onclick=()=>{cat.open=!cat.open;saveCats();renderProjs();};
    if(!cat.fixed)addLongPress(header,()=>openEditCatModal(cat.id));
    const body=document.createElement('div');
    body.className='proj-body';
    const items=document.createElement('div');
    items.className='proj-items';
    cat.items.forEach((item,i)=>{
      const div=document.createElement('div');
      div.className='proj-item'+(item.done?' done-p':'');
      div.innerHTML=`<div class="p-check"></div><span class="p-text">${item.text}</span>`;
      div.addEventListener('click',()=>{cat.items[i].done=!cat.items[i].done;saveCats();renderProjs();});
      addLongPress(div,()=>openProjItemModal(cat.id,i));
      items.appendChild(div);
    });
    const addRow=document.createElement('div');
    addRow.className='add-proj-row';
    addRow.innerHTML=`<input class="add-proj-input" placeholder="Ajouter…"><button class="add-proj-btn">+</button>`;
    const inp=addRow.querySelector('input'),btn=addRow.querySelector('button');
    const doAdd=()=>{if(!inp.value.trim())return;cat.items.push({text:inp.value.trim(),done:false});inp.value='';saveCats();renderProjs();showToast('Ajouté ✓');};
    btn.onclick=doAdd; inp.onkeydown=e=>{if(e.key==='Enter')doAdd();};
    body.appendChild(items); body.appendChild(addRow);
    card.appendChild(header); card.appendChild(body); list.appendChild(card);
  });
}

function openProjItemModal(catId,idx){editProjCatId=catId;editProjItemIdx=idx;document.getElementById('projItemEditInput').value=cats.find(c=>c.id===catId).items[idx].text;document.getElementById('projItemModal').classList.add('open');}
function saveProjItemEdit(){const v=document.getElementById('projItemEditInput').value.trim();if(!v)return;cats.find(c=>c.id===editProjCatId).items[editProjItemIdx].text=v;saveCats();closeModal('projItemModal');renderProjs();showToast('Modifié ✓');}
function deleteProjItem(){cats.find(c=>c.id===editProjCatId).items.splice(editProjItemIdx,1);saveCats();closeModal('projItemModal');renderProjs();showToast('Supprimé');}

function openNewCatModal(){editCatId=null;selectedEmoji='🎯';document.getElementById('newCatTitle').textContent='Nouvelle catégorie';document.getElementById('newCatInput').value='';document.getElementById('deleteCatBtn').style.display='none';renderEmojiPicker();document.getElementById('newCatModal').classList.add('open');}
function openEditCatModal(id){editCatId=id;const cat=cats.find(c=>c.id===id);selectedEmoji=cat.emoji;document.getElementById('newCatTitle').textContent='Modifier';document.getElementById('newCatInput').value=cat.name;document.getElementById('deleteCatBtn').style.display='block';renderEmojiPicker();document.getElementById('newCatModal').classList.add('open');}
function renderEmojiPicker(){const p=document.getElementById('emojiPicker');p.innerHTML='';EMOJIS.forEach(e=>{const s=document.createElement('span');s.className='emoji-opt'+(e===selectedEmoji?' selected':'');s.textContent=e;s.onclick=()=>{selectedEmoji=e;renderEmojiPicker();};p.appendChild(s);});}
function confirmNewCat(){const name=document.getElementById('newCatInput').value.trim();if(!name)return;if(editCatId){const cat=cats.find(c=>c.id===editCatId);cat.name=name;cat.emoji=selectedEmoji;}else{cats.push({id:'cat_'+Date.now(),name,emoji:selectedEmoji,fixed:false,open:false,items:[]});}saveCats();closeModal('newCatModal');renderProjs();showToast(editCatId?'Modifié ✓':'Créé ✓');}
function deleteCat(){cats=cats.filter(c=>c.id!==editCatId);saveCats();closeModal('newCatModal');renderProjs();showToast('Supprimé');}

// ── AGENDA ──
let agendaEvents=[];
async function loadAgenda(){
  const container=document.getElementById('agendaList');
  if(container)container.innerHTML='<div style="font-size:13px;color:var(--text-xlight);">Chargement…</div>';
  try{
    const r=await fetch(APPS_SCRIPT_URL+'?action=getAgenda&date='+dateKey(sel));
    agendaEvents=await r.json()||[];
  }catch(e){agendaEvents=[];}
  renderAgenda();
}
function renderAgenda(){
  const container=document.getElementById('agendaList');
  if(!container)return;
  if(agendaEvents.length===0){container.innerHTML='<div style="font-size:13px;color:var(--text-xlight);">Aucun événement aujourd\'hui</div>';return;}
  container.innerHTML='';
  agendaEvents.forEach(ev=>{
    const div=document.createElement('div');
    div.className='agenda-item';
    div.innerHTML=`<span class="agenda-time">${ev.allDay?'Toute la journée':ev.start}</span><span class="agenda-title">${ev.summary}</span>`;
    container.appendChild(div);
  });
}

// ── TRACKER PAGE ──
function renderTrackerPage(){
  const today=new Date();today.setHours(0,0,0,0);
  const ws=getWeekStart(today);
  const days=['L','M','M','J','V','S','D'];
  [['sleepGrid','sleep'],['waterGrid','water'],['sportGrid','sport'],['lectureGrid','lecture']].forEach(([id,field])=>{
    const grid=document.getElementById(id);grid.innerHTML='';
    days.forEach(d=>{const h=document.createElement('div');h.className='wg-header';h.textContent=d;grid.appendChild(h);});
    for(let i=0;i<7;i++){
      const d=new Date(ws);d.setDate(ws.getDate()+i);
      const raw=localStorage.getItem('tracker_'+dateKey(d));
      const data=raw?JSON.parse(raw):null;
      const cell=document.createElement('div');
      if(field==='sleep'){const h=data?parseFloat(data.sleep):0;cell.className='wg-cell'+(h>=7?' done':h>=5?' partial':h>0?' empty':'');cell.textContent=h||'';}
      else if(field==='water'){const w=data?data.water:0;cell.className='wg-cell'+(w>=6?' done':w>=3?' partial':w>0?' empty':'');cell.textContent=w||'';}
      else{cell.className='wg-cell'+(data&&(data[field]===true||data[field]==='true')?' done done-text':'');}
      grid.appendChild(cell);
    }
  });
}
