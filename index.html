<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRFBB HDF — Gestion de Projet</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #f0f2f5; --white: #fff; --border: #e2e8f0;
  --text: #1a202c; --muted: #718096; --accent: #e63946;
  --blue: #3b82f6; --green: #22c55e; --yellow: #f59e0b;
  --shadow: 0 1px 3px rgba(0,0,0,.1), 0 1px 2px rgba(0,0,0,.06);
  --shadow-lg: 0 10px 15px -3px rgba(0,0,0,.1), 0 4px 6px -2px rgba(0,0,0,.05);
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* HEADER */
header { background: var(--white); border-bottom: 1px solid var(--border); padding: 0 24px; height: 60px; display: flex; align-items: center; justify-content: space-between; box-shadow: var(--shadow); position: sticky; top: 0; z-index: 100; }
.logo { display: flex; align-items: center; gap: 12px; }
.logo-icon { width: 36px; height: 36px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-size: 18px; font-weight: bold; }
.logo-text { font-size: 18px; font-weight: 700; }
.logo-text span { color: var(--accent); }
.nav-tabs { display: flex; gap: 4px; }
.nav-tab { padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500; color: var(--muted); border: none; background: none; transition: all .15s; }
.nav-tab.active, .nav-tab:hover { background: #f1f5f9; color: var(--text); }
.nav-tab.active { color: var(--accent); font-weight: 600; }
.header-right { display: flex; align-items: center; gap: 10px; }
.team-avatars { display: flex; }
.avatar-sm { width: 32px; height: 32px; border-radius: 50%; border: 2px solid white; margin-left: -8px; overflow: hidden; cursor: pointer; transition: transform .15s; flex-shrink:0; }
.avatar-sm:first-child { margin-left: 0; }
.avatar-sm:hover { transform: translateY(-2px); z-index: 10; }
.avatar-sm img, .avatar-xs img { width: 100%; height: 100%; object-fit: cover; }

/* MAIN */
main { padding: 24px; max-width: 1400px; margin: 0 auto; }
.view { display: none; }
.view.active { display: block; }

/* BUTTONS */
.btn { padding: 9px 18px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; font-weight: 600; transition: all .15s; display: inline-flex; align-items: center; gap: 6px; }
.btn-primary { background: var(--accent); color: white; }
.btn-primary:hover { background: #c1121f; }
.btn-sm { padding: 6px 12px; font-size: 13px; }
.btn-outline { background: white; border: 1px solid var(--border); color: var(--text); }
.btn-outline:hover { background: #f8fafc; }

/* NEXT MEETING IN NAV */
.nav-tab-sub { font-size: 10px; font-weight: 500; color: var(--accent); display: block; margin-top: 1px; }
.nav-tab.active .nav-tab-sub { color: var(--accent); }
.nav-tab .nav-tab-sub { color: #718096; }
.nav-tab.active .nav-tab-sub { color: var(--accent); }

/* STATS - supprimées */

/* SECTION HEADER */
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.section-title { font-size: 22px; font-weight: 700; }

/* PROJECTS GRID */
.projects-grid { display: flex; flex-direction: column; gap: 8px; }
.project-card { background: white; border-radius: 12px; padding: 20px; box-shadow: var(--shadow); cursor: pointer; transition: all .2s; border: 2px solid transparent; position: relative; overflow: hidden; }
.project-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); border-color: var(--card-color); }
.project-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: var(--card-color); }
.project-card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; }
.project-emoji { font-size: 28px; }
.status-badge { font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 20px; text-transform: uppercase; letter-spacing: .5px; }
.badge-active { background: #dcfce7; color: #16a34a; }
.badge-warn { background: #fff7ed; color: #c2410c; }
.project-name { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
.project-desc { font-size: 13px; color: var(--muted); margin-bottom: 14px; line-height: 1.5; }
.progress-section { margin-bottom: 14px; }
.progress-header { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
.progress-bar { height: 6px; background: #f1f5f9; border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 3px; transition: width .5s; }
.project-meta { display: flex; align-items: center; justify-content: space-between; }
.task-counts { display: flex; gap: 8px; font-size: 12px; flex-wrap: wrap; }
.count-item { display: flex; align-items: center; gap: 4px; color: var(--muted); }
.count-dot { width: 8px; height: 8px; border-radius: 50%; }
.project-members { display: flex; }
.avatar-xs { width: 24px; height: 24px; border-radius: 50%; border: 2px solid white; margin-left: -6px; overflow: hidden; flex-shrink: 0; }
.avatar-xs:first-child { margin-left: 0; }

/* KANBAN */
.kanban-header { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
.back-btn { display: flex; align-items: center; gap: 6px; color: var(--muted); cursor: pointer; font-size: 14px; font-weight: 500; padding: 6px 12px; border-radius: 8px; transition: all .15s; }
.back-btn:hover { background: white; color: var(--text); box-shadow: var(--shadow); }
.kanban-title { font-size: 22px; font-weight: 700; flex: 1; }
.kanban-board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.kanban-column { background: #f8fafc; border-radius: 12px; padding: 16px; min-height: 500px; }
.col-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.col-title { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; display: flex; align-items: center; gap: 8px; }
.col-count { background: white; border: 1px solid var(--border); color: var(--muted); font-size: 12px; font-weight: 600; padding: 2px 7px; border-radius: 10px; }
.task-card { background: white; border-radius: 10px; padding: 14px; margin-bottom: 10px; box-shadow: var(--shadow); cursor: pointer; transition: all .15s; border-left: 3px solid var(--card-color, #e2e8f0); }
.task-card:hover { box-shadow: var(--shadow-lg); }
.task-title { font-size: 14px; font-weight: 600; margin-bottom: 6px; }
.task-meta { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
.task-date { font-size: 11px; color: var(--muted); margin-top: 4px; }
.task-date.overdue { color: #ef4444; font-weight: 600; }
.priority-badge { font-size: 10px; font-weight: 600; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; }
.p-high { background: #fee2e2; color: #dc2626; }
.p-medium { background: #fef3c7; color: #d97706; }
.p-low { background: #f0fdf4; color: #16a34a; }
.task-assignee { width: 22px; height: 22px; border-radius: 50%; overflow: hidden; flex-shrink: 0; }
.task-assignee img { width: 100%; height: 100%; object-fit: cover; }
.task-assignee-init { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; color: white; }
.add-task-btn { width: 100%; padding: 10px; background: transparent; border: 1px dashed var(--border); border-radius: 8px; color: var(--muted); font-size: 13px; cursor: pointer; transition: all .15s; margin-top: 8px; }
.add-task-btn:hover { background: white; color: var(--text); border-color: var(--blue); }

/* REUNIONS */
.reunion-card { background: white; border-radius: 12px; padding: 24px; box-shadow: var(--shadow); margin-bottom: 16px; }
.reunion-card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 12px; }
.reunion-date-big { font-size: 28px; font-weight: 800; color: var(--accent); line-height: 1; }
.reunion-month { font-size: 13px; color: var(--muted); font-weight: 500; }
.reunion-card-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
.reunion-card-time { font-size: 14px; color: var(--muted); }
.agenda-title, .cr-label { font-size: 12px; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); font-weight: 600; margin-bottom: 10px; }
.agenda-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; background: #f8fafc; border-radius: 8px; margin-bottom: 6px; font-size: 14px; }
.agenda-num { width: 20px; height: 20px; background: var(--accent); color: white; border-radius: 50%; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.cr-section { margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }
.cr-block { background: #f8fafc; border-radius: 8px; padding: 14px; margin-bottom: 10px; }
.cr-block-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; color: var(--accent); }
.cr-textarea { width: 100%; border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; font-size: 14px; font-family: inherit; resize: vertical; min-height: 80px; }
.cr-textarea:focus { outline: none; border-color: var(--blue); }

/* OVERDUE - supprimé */

/* MODAL */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 24px; opacity: 0; pointer-events: none; transition: opacity .2s; }
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal { background: white; border-radius: 16px; padding: 28px; max-width: 520px; width: 100%; box-shadow: var(--shadow-lg); transform: translateY(20px); transition: transform .2s; max-height: 85vh; overflow-y: auto; }
.modal-overlay.open .modal { transform: translateY(0); }
.modal-title { font-size: 20px; font-weight: 700; margin-bottom: 20px; }
.form-group { margin-bottom: 16px; }
.form-label { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 6px; display: block; }
.form-input, .form-select, .form-textarea { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; font-family: inherit; transition: border-color .15s; }
.form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px rgba(59,130,246,.1); }
.form-textarea { resize: vertical; min-height: 80px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; flex-wrap: wrap; }
.members-select { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }
.member-pill { display: flex; align-items: center; gap: 6px; padding: 5px 10px; border-radius: 20px; border: 2px solid var(--border); cursor: pointer; font-size: 13px; font-weight: 500; transition: all .15s; user-select: none; }
.member-pill.selected { border-color: var(--accent); background: #fff5f5; color: var(--accent); }
.member-pill img { width: 20px; height: 20px; border-radius: 50%; object-fit: cover; }
.empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
.empty-icon { font-size: 48px; margin-bottom: 12px; }
.empty-text { font-size: 16px; font-weight: 500; }

/* SOUS-PROJETS */
.subproject-tabs { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
.sub-tab { padding: 5px 14px; border-radius: 20px; border: 1px solid var(--border); background: white; font-size: 13px; font-weight: 500; cursor: pointer; color: var(--muted); transition: all .15s; }
.sub-tab.active { color: white; border-color: transparent; }
.sub-tab.add-sub { border-style: dashed; color: var(--muted); }
.sub-tab.add-sub:hover { background: #f8fafc; color: var(--text); }

/* PLANNING */
.planning-wrap { overflow-x: auto; }
.planning-months { display: flex; border-bottom: 1px solid var(--border); background: #f8fafc; }
.planning-month { flex-shrink: 0; text-align: center; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); padding: 8px 0; border-right: 1px solid var(--border); }
.planning-row { display: flex; align-items: center; border-bottom: .5px solid var(--border); min-height: 40px; }
.planning-label { flex-shrink: 0; width: 180px; font-size: 13px; padding: 0 12px; display: flex; align-items: center; gap: 8px; overflow: hidden; }
.planning-track { flex: 1; position: relative; height: 40px; }
.planning-bar { position: absolute; height: 22px; top: 9px; border-radius: 11px; display: flex; align-items: center; padding: 0 10px; font-size: 11px; font-weight: 600; color: white; cursor: pointer; transition: opacity .15s; white-space: nowrap; overflow: hidden; }
.planning-bar:hover { opacity: .8; }
.planning-bar.done { opacity: .5; text-decoration: line-through; }
.planning-today { position: absolute; top: 0; bottom: 0; width: 2px; background: var(--accent); z-index: 10; }

/* AGENDA TABLE */
.agenda-table { width:100%;border-collapse:collapse;margin-top:10px;font-size:13px; }
.agenda-table th { background:#f8fafc;padding:8px 12px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);border-bottom:1px solid var(--border); }
.agenda-table td { padding:8px 10px;vertical-align:top;border-bottom:.5px solid var(--border); }
.agenda-table tr:last-child td { border-bottom:none; }
.agenda-table textarea { width:100%;border:1px solid var(--border);border-radius:6px;padding:6px 8px;font-size:13px;font-family:inherit;resize:vertical;min-height:56px; }
.agenda-table textarea:focus { outline:none;border-color:var(--blue); }


/* TIMER & QUARTS */
.timer-block { background: #1a202c; color: white; border-radius: 12px; padding: 16px 20px; margin-bottom: 16px; }
.timer-quarts { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 14px; }
.quart { background: rgba(255,255,255,.08); border-radius: 8px; padding: 8px 10px; text-align: center; border: 2px solid transparent; transition: all .2s; }
.quart.active { border-color: var(--accent); background: rgba(230,57,70,.2); }
.quart.done { background: rgba(34,197,94,.15); border-color: #22c55e; }
.quart-label { font-size: 10px; font-weight: 700; letter-spacing: .5px; opacity: .6; text-transform: uppercase; }
.quart-time { font-size: 13px; font-weight: 700; margin: 2px 0; }
.quart-title { font-size: 11px; opacity: .8; }
.timer-display { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.timer-clock { font-size: 42px; font-weight: 800; font-family: monospace; letter-spacing: 2px; }
.timer-clock.warning { color: #f59e0b; animation: blink .8s ease-in-out infinite; }
.timer-clock.danger { color: var(--accent); animation: blink .4s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }
.timer-progress { height: 6px; background: rgba(255,255,255,.15); border-radius: 3px; margin-top: 10px; overflow: hidden; }
.timer-progress-fill { height: 100%; border-radius: 3px; transition: width .5s, background .3s; }
.timer-btns { display: flex; gap: 8px; flex-shrink:0; }
.timer-btn { padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; }
.timer-btn-start { background: #22c55e; color: white; }
.timer-btn-reset { background: rgba(255,255,255,.15); color: white; }
.capitaine-block { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,.08); border-radius: 8px; padding: 8px 12px; margin-top: 10px; }
.capitaine-label { font-size: 11px; opacity: .6; text-transform: uppercase; letter-spacing: .5px; }
.capitaine-name { font-size: 14px; font-weight: 700; }

/* ÉTOILE PRIORITAIRE */
.star-btn { background: none; border: none; cursor: pointer; font-size: 18px; padding: 0 2px; line-height: 1; transition: transform .15s; flex-shrink: 0; }
.star-btn:hover { transform: scale(1.2); }
.star-btn.starred { color: #f59e0b; }
.star-btn.unstarred { color: #e2e8f0; }
.priority-row td { background: #fffbeb; }
.priority-badge-star { font-size: 10px; background: #fef3c7; color: #d97706; padding: 1px 6px; border-radius: 8px; font-weight: 600; margin-left: 6px; }

/* EXPORT CR */
.cr-export-btn { width:100%;padding:10px;background:#1a202c;color:white;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;margin-top:12px; }
.cr-export-btn:hover { background:#2d3748; }
.cr-export-box { display:none;background:#f8fafc;border:1px solid var(--border);border-radius:10px;padding:16px;margin-top:10px; }
.cr-export-box.open { display:block; }
.cr-export-text { font-family:monospace;font-size:12px;line-height:1.8;white-space:pre-wrap;color:var(--text); }
.cr-copy-btn { margin-top:10px;padding:7px 14px;background:var(--accent);color:white;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer; }

/* MATCH DU MOIS */
.match-card { background:linear-gradient(135deg,#1a202c,#2d3748);color:white;border-radius:12px;padding:20px 24px;margin-bottom:16px; }
.match-grid { display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px; }
.match-block { background:rgba(255,255,255,.08);border-radius:8px;padding:12px; }
.match-block-title { font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;opacity:.6;margin-bottom:6px; }
.match-block textarea { width:100%;background:transparent;border:none;color:white;font-size:13px;font-family:inherit;resize:vertical;min-height:60px;outline:none; }
.match-block textarea::placeholder { opacity:.4; }

/* ONGLETS REUNION */
.reunions-tabs { display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap; }
.rtab { padding:8px 18px;border-radius:8px;border:1px solid var(--border);background:white;font-size:14px;font-weight:500;cursor:pointer;color:var(--muted);transition:all .15s; }
.rtab.active { background:var(--accent);color:white;border-color:var(--accent); }
.archive-badge { background:#f1f5f9;color:var(--muted);font-size:11px;padding:2px 8px;border-radius:10px;margin-left:6px;font-weight:600; }


/* AGENDA BUILDER */
.agenda-builder { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
.agenda-item-row { display: flex; gap: 8px; align-items: center; background: #f8fafc; border-radius: 8px; padding: 8px 10px; border: 1px solid var(--border); }
.agenda-item-row:hover { border-color: #94a3b8; }
.agenda-theme-badge { font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 10px; white-space: nowrap; flex-shrink: 0; }
.agenda-item-text { flex: 1; border: none; background: transparent; font-size: 13px; font-family: inherit; outline: none; color: var(--text); }
.agenda-item-text::placeholder { color: #94a3b8; }
.agenda-remove-btn { background: none; border: none; color: #cbd5e1; cursor: pointer; font-size: 16px; padding: 0 2px; flex-shrink: 0; transition: color .15s; }
.agenda-remove-btn:hover { color: var(--accent); }
.agenda-add-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
.agenda-add-btn { padding: 5px 12px; border-radius: 20px; border: 1.5px dashed var(--border); background: white; font-size: 12px; font-weight: 600; cursor: pointer; transition: all .15s; }
.agenda-add-btn:hover { background: #f1f5f9; border-style: solid; }


/* CR EXPORT AMÉLIORÉ */
.cr-export-btns { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
.cr-btn-quick { flex:1; padding:10px; background:#1a202c; color:white; border:none; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; min-width:140px; }
.cr-btn-quick:hover { background:#2d3748; }
.cr-btn-paul { flex:1; padding:10px; background:#e63946; color:white; border:none; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; min-width:140px; }
.cr-btn-paul:hover { background:#c1121f; }
.cr-export-box { display:none; margin-top:10px; border-radius:10px; overflow:hidden; border:1px solid var(--border); }
.cr-export-box.open { display:block; }
.cr-tabs { display:flex; border-bottom:1px solid var(--border); }
.cr-tab { flex:1; padding:8px; text-align:center; font-size:12px; font-weight:600; cursor:pointer; background:#f8fafc; color:var(--muted); border:none; }
.cr-tab.active { background:white; color:var(--text); }
.cr-tab-content { display:none; padding:14px; }
.cr-tab-content.active { display:block; }
.cr-export-text { font-family:monospace; font-size:12px; line-height:1.8; white-space:pre-wrap; color:var(--text); background:#f8fafc; border-radius:6px; padding:10px 12px; }
.cr-actions-row { display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; }
.cr-copy-btn { padding:7px 14px; background:var(--accent); color:white; border:none; border-radius:6px; font-size:12px; font-weight:600; cursor:pointer; }
.cr-mail-btn { padding:7px 14px; background:#2563eb; color:white; border:none; border-radius:6px; font-size:12px; font-weight:600; cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; gap:4px; }

/* CHAMP PAUL */
.paul-block { background:#fff5f5; border:1.5px solid #fca5a5; border-radius:10px; padding:14px; margin-top:12px; }
.paul-block-title { font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; color:#dc2626; margin-bottom:8px; display:flex; align-items:center; gap:6px; }
.paul-textarea { width:100%; border:1px solid #fca5a5; border-radius:8px; padding:10px 12px; font-size:13px; font-family:inherit; resize:vertical; min-height:70px; background:white; }
.paul-textarea:focus { outline:none; border-color:#dc2626; }

/* ACTIONS REPORTÉES */
.reported-badge { font-size:10px; background:#fef3c7; color:#d97706; border:1px solid #f59e0b; padding:2px 6px; border-radius:6px; font-weight:600; margin-left:6px; }


/* STATUTS SUJETS */
.status-pill { border:none; border-radius:20px; padding:3px 10px; font-size:11px; font-weight:700; cursor:pointer; transition:all .15s; white-space:nowrap; }
.status-todo    { background:#f1f5f9; color:#64748b; }
.status-done-s  { background:#dcfce7; color:#16a34a; }
.status-report  { background:#fef3c7; color:#d97706; }

@media (max-width: 768px) {
  .kanban-board { grid-template-columns: 1fr; }
  .form-row { grid-template-columns: 1fr; }
  .planning-label { width: 120px; }
}
</style>
</head>
<body>
<header>
  <div class="logo">
    <div class="logo-icon">🏀</div>
    <div class="logo-text">IRFBB <span>HDF</span></div>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showView('dashboard')">🏠 Projets</button>
    <button class="nav-tab" onclick="showView('reunions')" id="navReunionTab">📅 Réunions<span class="nav-tab-sub" id="navNextDate"></span></button>
    <button class="nav-tab" onclick="showView('planning')">📆 Planning</button>
  </div>
  <div class="header-right">
    <span id="save-indicator" style="font-size:12px;color:#22c55e;font-weight:600;opacity:0;transition:opacity .3s;margin-right:8px">✓ Sauvegardé</span>
    <div class="team-avatars" id="headerAvatars"></div>
    <button class="btn btn-primary btn-sm" onclick="openModal('project')">+ Projet</button>
  </div>
</header>
<!-- Barre de chargement -->
<div id="loadingBar" style="display:none;position:fixed;top:60px;left:0;right:0;z-index:200">
  <div style="height:3px;background:linear-gradient(90deg,#e63946,#f4a261,#e63946);background-size:200%;animation:slide 1.2s linear infinite"></div>
</div>
<!-- Bannière d'erreur -->
<div id="errorBanner" style="display:none;position:fixed;top:70px;left:50%;transform:translateX(-50%);z-index:300;background:#fff5f5;border:1px solid #fecaca;color:#dc2626;padding:12px 20px;border-radius:10px;font-size:14px;box-shadow:0 4px 12px rgba(0,0,0,.1);max-width:500px;text-align:center"></div>
<style>
@keyframes slide { 0%{background-position:0%} 100%{background-position:200%} }
</style>

<main>
  <!-- DASHBOARD -->
  <div class="view active" id="view-dashboard">
    <div class="section-header">
      <div class="section-title">Projets</div>
      <button class="btn btn-primary" onclick="openModal('project')">+ Nouveau projet</button>
    </div>
    <div class="projects-grid" id="projectsGrid"></div>
  </div>

  <!-- KANBAN -->
  <div class="view" id="view-kanban">
    <div class="kanban-header">
      <div class="back-btn" onclick="showView('dashboard')">← Retour</div>
      <span id="kanbanEmoji" style="font-size:24px"></span>
      <div class="kanban-title" id="kanbanTitle"></div>
      <div style="display:flex;gap:8px;margin-left:auto">
        <button class="btn btn-sm btn-outline" onclick="openModal('subproject')">+ Sous-projet</button>
        <button class="btn btn-primary btn-sm" onclick="openModal('task')">+ Tâche</button>
      </div>
    </div>
    <div class="subproject-tabs" id="subprojectTabs"></div>
    <div class="kanban-board" id="kanbanBoard"></div>
  </div>

  <!-- PLANNING -->
  <div class="view" id="view-planning">
    <div class="section-header">
      <div class="section-title">📆 Planning annuel</div>
      <button class="btn btn-primary" onclick="openModal('planningevent')">+ Ajouter un événement</button>
    </div>
    <div class="planning-wrap" id="planningWrap"></div>
  </div>

  <!-- REUNIONS -->
  <div class="view" id="view-reunions">
    <div class="section-header">
      <div class="section-title">Réunions</div>
      <button class="btn btn-primary" onclick="openModal('reunion')">+ Nouvelle réunion</button>
    </div>
    <div class="reunions-tabs">
      <button class="rtab active" onclick="switchReunionTab('upcoming',this)">📅 À venir</button>
      <button class="rtab" onclick="switchReunionTab('past',this)">🗂️ Archives <span class="archive-badge" id="archiveCount">0</span></button>
      <button class="rtab" onclick="switchReunionTab('match',this)">🏟️ Match du mois</button>
    </div>
    <div id="reunionsList"></div>
  </div>
</main>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div id="modalBody"></div>
  </div>
</div>

// Appel générique vers le backend (GET pour éviter CORS)
async function api(action, body = {}) {
  const payload = encodeURIComponent(JSON.stringify({ action, ...body }));
  const res = await fetch(API_URL + '?payload=' + payload, {
    method: 'GET',
    redirect: 'follow',
  });
  const json = await res.json();
  if (!json.success) throw new Error(json.error || 'Erreur API');
  return json.data;
}

// Charge toutes les données depuis Google Sheets
async function loadData() {
  showLoading(true);
  try {
    const data = await api('getData');
    state.projects      = data.projects || [];
    state.tasks         = data.tasks    || [];
    state.reunions      = data.reunions || [];
    state.planningEvents = data.events  || [];
    // Si le Sheets est vide, on injecte les données par défaut
    if (!state.projects.length) {
      for (const p of PROJECTS_DEFAULT) await api('saveProject', { data: p });
      for (const t of TASKS_DEFAULT)    await api('saveTask',    { data: t });
      for (const r of REUNIONS_DEFAULT) await api('saveReunion', { data: r });
      const fresh = await api('getData');
      state.projects       = fresh.projects || [];
      state.tasks          = fresh.tasks    || [];
      state.reunions       = fresh.reunions || [];
      state.planningEvents = fresh.events   || [];
    }
  } catch(e) {
    showError('Impossible de contacter Google Sheets. Vérifie l\'URL du script.<br><small>' + e.message + '</small>');
  } finally {
    showLoading(false);
  }
}

function renderPlanning() {
  const now = new Date(); now.setHours(0,0,0,0);
  const year = now.getFullYear();
  const DAY_W = 4;
  const LABEL_W = 280;
  const yearStart = new Date(year, 0, 1);

  // Mois
  const months = [];
  for (let m = 0; m < 12; m++) {
    const daysInMonth = new Date(year, m+1, 0).getDate();
    const name = new Date(year, m, 1).toLocaleDateString('fr-FR', {month:'long'});
    months.push({ name, days: daysInMonth });
  }
  const trackW = months.reduce((s, m) => s + m.days, 0) * DAY_W;
  const todayLeft = Math.floor((now - yearStart) / 86400000) * DAY_W;

  // Header mois
  let monthsHtml = `<div style="display:flex;margin-left:${LABEL_W}px;border-bottom:1px solid var(--border);background:#f8fafc;position:sticky;top:0;z-index:20">`;
  months.forEach(m => {
    monthsHtml += `<div style="flex-shrink:0;width:${m.days*DAY_W}px;text-align:center;font-size:11px;font-weight:700;text-transform:uppercase;color:var(--muted);padding:6px 0;border-right:1px solid var(--border)">${m.name.substring(0,4)}</div>`;
  });
  monthsHtml += '</div>';

  // Grille verticale (fond)
  let gridHtml = '';
  let ox = 0;
  months.forEach((m, i) => {
    gridHtml += `<div style="position:absolute;left:${ox}px;top:0;bottom:0;width:${m.days*DAY_W}px;border-right:1px solid #f0f4f8;background:${i%2===0?'transparent':'rgba(0,0,0,.008)'}"></div>`;
    ox += m.days * DAY_W;
  });
  const todayLine = `<div style="position:absolute;left:${todayLeft}px;top:0;bottom:0;width:2px;background:var(--accent);z-index:15;opacity:.7"></div>`;

  // Fonction pour construire une ligne de timeline
  function trackRow(label, barHtml, bgColor) {
    return `<div style="display:flex;align-items:center;min-height:40px;border-bottom:.5px solid #f0f4f8;background:${bgColor||'white'}" onmouseenter="this.style.background='#fafafa'" onmouseleave="this.style.background='${bgColor||'white'}'">
      <div style="flex-shrink:0;width:${LABEL_W}px;padding:0 8px 0 12px;overflow:hidden">${label}</div>
      <div style="position:relative;height:40px;width:${trackW}px;flex-shrink:0">${gridHtml}${todayLine}${barHtml}</div>
    </div>`;
  }

  let html = '';

  // ── 1. ÉVÉNEMENTS EN HAUT — 2 lignes max avec détection chevauchement ──
  const events = (state.planningEvents || []).sort((a,b) => new Date(a.date)-new Date(b.date));
  if (events.length) {
    const BAR_MIN_W = 130; // largeur minimale d'un bandeau en px

    // Détection chevauchement : on assigne chaque événement à la ligne 0 ou 1
    const evWithPos = events.map(ev => {
      const evDay = Math.floor((new Date(ev.date) - yearStart) / 86400000);
      const left = Math.max(0, Math.min(evDay * DAY_W, trackW - BAR_MIN_W));
      return { ...ev, left, right: left + BAR_MIN_W };
    });

    // Assigner ligne 0 ou 1
    const line0End = {}; // dernière position droite utilisée sur ligne 0
    let maxRight0 = -999;
    let maxRight1 = -999;
    evWithPos.forEach(ev => {
      if (ev.left >= maxRight0 + 4) { ev.row = 0; maxRight0 = ev.right; }
      else if (ev.left >= maxRight1 + 4) { ev.row = 1; maxRight1 = ev.right; }
      else { ev.row = 1; maxRight1 = Math.max(maxRight1, ev.right); } // force ligne 1
    });

    const hasRow1 = evWithPos.some(e => e.row === 1);
    const evBlockH = hasRow1 ? 76 : 40;

    // Construire les bandeaux
    let evBars = '';
    evWithPos.forEach(ev => {
      const top = ev.row === 0 ? 6 : 42;
      evBars += `<div onclick="openModal('planningevent',null,${JSON.stringify(ev).replace(/"/g,'&quot;')})"
        style="position:absolute;left:${ev.left}px;top:${top}px;height:26px;border-radius:6px;background:#6366f1;border-top:3px solid #4f46e5;display:flex;align-items:center;padding:0 8px;font-size:10px;font-weight:700;color:white;white-space:nowrap;cursor:pointer;z-index:10;max-width:${BAR_MIN_W+20}px;overflow:hidden"
        title="${ev.title} — ${formatDate(ev.date)}">
        ${ev.title.length > 12 ? ev.title.substring(0,10)+'…' : ev.title} · ${new Date(ev.date).toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'})}
      </div>`;
    });

    html += `<div style="display:flex;align-items:flex-start;background:#eef2ff;border-bottom:1px solid #c7d2fe">
      <div style="flex-shrink:0;width:${LABEL_W}px;padding:10px 12px;font-weight:700;font-size:12px;color:#6366f1;text-transform:uppercase;letter-spacing:.5px;line-height:1.6">📌<br>Événements</div>
      <div style="position:relative;height:${evBlockH}px;width:${trackW}px;flex-shrink:0">${gridHtml}${todayLine}${evBars}</div>
    </div>`;
  }

  // ── 2. TÂCHES PAR PROJET ──────────────────────────────────
  const tasks = state.tasks.filter(t => t.due).sort((a,b) => new Date(a.due)-new Date(b.due));
  state.projects.forEach(p => {
    const ptasks = tasks.filter(t => t.projectId === p.id);
    if (!ptasks.length) return;

    // Header projet
    html += `<div style="display:flex;align-items:center;min-height:30px;background:#f8fafc;border-bottom:.5px solid var(--border)">
      <div style="flex-shrink:0;width:${LABEL_W}px;padding:0 12px;font-weight:700;font-size:13px;color:${p.color}">${p.emoji} ${p.name}</div>
      <div style="position:relative;height:30px;width:${trackW}px;flex-shrink:0">${gridHtml}${todayLine}</div>
    </div>`;

    ptasks.forEach(t => {
      const dueDate = new Date(t.due);
      const dueDay = Math.floor((dueDate - yearStart) / 86400000);
      const left = Math.max(0, Math.min(dueDay * DAY_W, trackW - 150));
      const isDone = t.status === 'done';
      const isOv = !isDone && dueDate < now;
      const col = isDone ? '#22c55e' : isOv ? '#ef4444' : p.color;
      const m = getMember(t.assignee);
      const av = m?.avatar ? `<img src="${m.avatar}" style="width:14px;height:14px;border-radius:50%;object-fit:cover;margin-right:3px;flex-shrink:0;vertical-align:middle">` : '';
      const bar = `<div onclick="openModal('task',null,${JSON.stringify(t).replace(/"/g,'&quot;')})"
        style="position:absolute;left:${left}px;top:9px;height:22px;border-radius:11px;background:${col};display:flex;align-items:center;padding:0 8px;font-size:10px;font-weight:600;color:white;white-space:nowrap;cursor:pointer;z-index:10;opacity:${isDone?.55:1}"
        title="${t.title} — ${formatDate(t.due)}">
        ${av}${isOv?'⚠️ ':isDone?'✓ ':''}${formatDate(t.due)}
      </div>`;
      const chk = `<input type="checkbox" ${isDone?'checked':''} onclick="event.stopPropagation();toggleTaskDone('${t.id}',this.checked)" style="width:14px;height:14px;cursor:pointer;accent-color:${col};flex-shrink:0">`;
      const label = `<div style="display:flex;align-items:center;gap:6px;padding:0 4px">${chk}<span style="font-size:12px;color:${isDone?'var(--muted)':'var(--text)'};${isDone?'text-decoration:line-through':''};overflow:hidden;white-space:nowrap;text-overflow:ellipsis" title="${t.title}">${t.title.substring(0,32)}${t.title.length>32?'…':''}</span></div>`;
      html += trackRow(label, bar, 'white');
    });
  });

  const empty = !html ? `<div class="empty-state"><div class="empty-icon">📅</div><div class="empty-text">Aucune t\u00e2che avec date d\u2019\u00e9ch\u00e9ance</div></div>` : '';

  document.getElementById('planningWrap').innerHTML = `
    <div style="font-size:12px;color:var(--muted);margin-bottom:8px;display:flex;gap:16px;flex-wrap:wrap">
      <span>Année ${year}</span>
      <span style="color:var(--accent)">▎Aujourd'hui</span>
      <span style="color:#22c55e">▎Terminé</span>
      <span style="color:#ef4444">▎En retard</span>
      <span style="color:#6366f1">▎Événement</span>
    </div>
    <div style="overflow-x:auto;border:1px solid var(--border);border-radius:10px">${monthsHtml}${html}${empty}</div>`;
}

async function toggleTaskDone(id, checked) {
  const t = state.tasks.find(x => x.id === id);
  if (!t) return;
  t.status = checked ? 'done' : 'todo';
  try { await api('saveTask', { data: t }); renderPlanning(); }
  catch(e) { showError(e.message); }
}

async function toggleEventDone(id, checked) {
  const ev = (state.planningEvents || []).find(x => x.id === id);
  if (!ev) return;
  ev.done = checked;
  try { await api('saveCR', { id: 'planningEvents', field: 'data', value: JSON.stringify(state.planningEvents) }); renderPlanning(); }
  catch(e) { /* silencieux */ renderPlanning(); }
}

function renderReunions() {
  const el = document.getElementById('reunionsList');
  const now = new Date(); now.setHours(0,0,0,0);
  const upcoming = state.reunions.filter(r => r.date && new Date(r.date) >= now).sort((a,b) => new Date(a.date)-new Date(b.date));

// Debounce pour sauvegardes automatiques
const _debounceTimers = {};
function debounceSaveNote(rid, index, field, value) {
  const key = rid + '_note_' + index + '_' + field;
  clearTimeout(_debounceTimers[key]);
  _debounceTimers[key] = setTimeout(() => saveAgendaNote(rid, index, field, value), 800);
}
function debouncesCR(rid, field, value) {
  const key = rid + '_cr_' + field;
  clearTimeout(_debounceTimers[key]);
  _debounceTimers[key] = setTimeout(() => saveCR(rid, field, value), 800);
}

async function saveAgendaNote(rid, index, field, value) {
  const r = state.reunions.find(x => x.id === rid);
  if (!r) return;
  let notes = {};
  try { notes = r.agendaNotes ? JSON.parse(r.agendaNotes) : {}; } catch(e) { notes = {}; }
  const key = 'item_' + index;
  if (!notes[key]) notes[key] = {};
  notes[key][field] = value;
  r.agendaNotes = JSON.stringify(notes);
  // Sauvegarde complète de la réunion (plus fiable que updateCR)
  try {
    await api('saveReunion', { data: r });
    // Feedback visuel discret
    const indicator = document.getElementById('save-indicator');
    if (indicator) { indicator.textContent = '✓ Sauvegardé'; indicator.style.opacity = '1'; setTimeout(() => indicator.style.opacity = '0', 1500); }
  } catch(e) { showError(e.message); }
}

async function saveCR(rid, field, value) {
  const r = state.reunions.find(x => x.id === rid);
  if (!r) return;
  r[field] = value;
  try {
    await api('saveReunion', { data: r });
    const indicator = document.getElementById('save-indicator');
    if (indicator) { indicator.textContent = '✓ Sauvegardé'; indicator.style.opacity = '1'; setTimeout(() => indicator.style.opacity = '0', 1500); }
  } catch(e) { showError(e.message); }
}
function editReunion(id) { openModal('reunion', null, state.reunions.find(r => r.id === id)); }
async function deleteReunion(id) {
  if (!confirm('Supprimer cette réunion ?')) return;
  showLoading(true);
  try {
    await api('deleteReunion', { id });
    state.reunions = state.reunions.filter(r => r.id !== id);
    renderReunions(); updateNavNextDate();
  } catch(e) { showError(e.message); }
  finally { showLoading(false); }
}


// ── TIMER ────────────────────────────────────────────────────
const _timers = {};
const TOTAL = 1800;
const Q_BOUNDS = [0, 300, 900, 1500, 1800];

function toggleTimer(rid) {
  if (_timers[rid]?.running) pauseTimer(rid); else startTimer(rid);
}
function startTimer(rid) {
  if (!_timers[rid]) _timers[rid] = { elapsed:0, running:false };
  _timers[rid].running = true;
  const btn = document.getElementById('timer-btn-'+rid);
  if (btn) btn.textContent = '⏸ Pause';
  _timers[rid].iv = setInterval(() => {
    _timers[rid].elapsed = Math.min(_timers[rid].elapsed + 1, TOTAL);
    updateTimerDisplay(rid);
    if (_timers[rid].elapsed >= TOTAL) { clearInterval(_timers[rid].iv); _timers[rid].running = false; if (btn) btn.textContent = '▶ Démarrer'; }
  }, 1000);
}
function pauseTimer(rid) {
  clearInterval(_timers[rid]?.iv);
  if (_timers[rid]) _timers[rid].running = false;
  const btn = document.getElementById('timer-btn-'+rid);
  if (btn) btn.textContent = '▶ Reprendre';
}
function resetTimer(rid) {
  clearInterval(_timers[rid]?.iv);
  _timers[rid] = { elapsed:0, running:false };
  updateTimerDisplay(rid);
  const btn = document.getElementById('timer-btn-'+rid);
  if (btn) btn.textContent = '▶ Démarrer';
}
function updateTimerDisplay(rid) {
  const elapsed = _timers[rid]?.elapsed || 0;
  const rem = TOTAL - elapsed;
  const clock = document.getElementById('timer-clock-'+rid);
  const bar   = document.getElementById('timer-bar-'+rid);
  if (!clock) return;
  clock.textContent = String(Math.floor(rem/60)).padStart(2,'0') + ':' + String(rem%60).padStart(2,'0');
  clock.className = 'timer-clock' + (rem<=300?' danger':rem<=600?' warning':'');
  const pct = ((TOTAL-rem)/TOTAL)*100;
  const col  = rem>600?'#22c55e':rem>300?'#f59e0b':'#ef4444';
  if (bar) { bar.style.width=(100-pct)+'%'; bar.style.background=col; }
  for (let i=0;i<4;i++) {
    const q = document.getElementById('quart-'+rid+'-'+i);
    if (!q) continue;
    if (elapsed>=Q_BOUNDS[i]&&elapsed<Q_BOUNDS[i+1]) q.className='quart active';
    else if (elapsed>=Q_BOUNDS[i+1]) q.className='quart done';
    else q.className='quart';
  }
}

// ── STATUT SUJET ─────────────────────────────────────────────
async function cycleStatus(rid, idx) {
  const r = state.reunions.find(x=>x.id===rid);
  if (!r) return;
  let notes={};
  try { notes=r.agendaNotes?JSON.parse(r.agendaNotes):{}; } catch(e){}
  const key='item_'+idx;
  if (!notes[key]) notes[key]={};
  const cur = notes[key].status||'todo';
  notes[key].status = cur==='todo'?'done':cur==='done'?'report':'todo';
  r.agendaNotes = JSON.stringify(notes);
  try { await api('saveReunion',{data:r}); renderReunions(); } catch(e){ showError(e.message); }
}

// ── CAPITAINE ────────────────────────────────────────────────
async function saveCapitaine(rid, memberId) {
  const r = state.reunions.find(x=>x.id===rid);
  if (!r) return;
  let notes={};
  try { notes=r.agendaNotes?JSON.parse(r.agendaNotes):{}; } catch(e){}
  notes._capitaine = memberId;
  r.agendaNotes = JSON.stringify(notes);
  const el = document.getElementById('cap-'+rid);
  const m = getMember(memberId);
  if (el) el.textContent = m?m.name:'Non désigné';
  try { await api('saveReunion',{data:r}); } catch(e){ showError(e.message); }
}

// ── ÉTOILE ───────────────────────────────────────────────────
async function toggleStar(rid, idx) {
  const r = state.reunions.find(x=>x.id===rid);
  if (!r) return;
  let notes={};
  try { notes=r.agendaNotes?JSON.parse(r.agendaNotes):{}; } catch(e){}
  notes._starred = (notes._starred===idx) ? -1 : idx;
  r.agendaNotes = JSON.stringify(notes);
  try { await api('saveReunion',{data:r}); renderReunions(); } catch(e){ showError(e.message); }
}

function toggleCRExport(rid) {
  const box = document.getElementById('cr-box-'+rid);
  const txt = document.getElementById('cr-txt-'+rid);
  if (!box||!txt) return;
  const r = state.reunions.find(x=>x.id===rid);
  if (!r) return;
  let notes={};
  try { notes=r.agendaNotes?JSON.parse(r.agendaNotes):{}; } catch(e){}
  const dt = new Date(r.date);
  const dateStr = dt.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const cap = getMember(notes._capitaine);
  const decisions=[], actions=[];
  (r.agenda||[]).forEach((a,i)=>{
    const key='item_'+i;
    const star = notes._starred===i ? '⭐ ' : '';
    if (notes[key]?.decision) decisions.push('• '+star+a+' → '+notes[key].decision);
    if (notes[key]?.action)   actions.push('• '+star+a+' : '+notes[key].action);
  });
  const lines = [
    '📋 COMPTE RENDU — '+r.title.toUpperCase(),
    '📅 '+dateStr+(cap?' | 👤 Capitaine : '+cap.name:''),
    '',
    decisions.length ? '\u2705 D\u00c9CISIONS\n'+decisions.join('\n') : '✅ Aucune décision formalisée',
    '',
    actions.length ? '\uD83C\uDFAF ACTIONS\n'+actions.join('\n') : '🎯 Aucune action',
    '',
    r.nextMeeting ? '\uD83D\uDCC5 PROCHAINE R\u00c9UNION\n'+r.nextMeeting : '',
  ].filter(x=>x!==undefined).join('\n');
  txt.textContent = lines;
  box.classList.toggle('open');
}
function copyCR(rid) {
  const el = document.getElementById('cr-txt-'+rid);
  if (!el) return;
  navigator.clipboard.writeText(el.textContent).then(()=>{
    const btn = el.nextElementSibling;
    if (btn){ btn.textContent='✓ Copié !'; setTimeout(()=>btn.textContent='📋 Copier',2000); }
  });
}

let _modalMode = null, _editId = null;

function openModal(type, statusHint, editData) {
  _modalMode = type;
  _editId = editData?.id || null;
  let html = '';
  if (type === 'project') html = buildProjectForm(editData);
  else if (type === 'task') html = buildTaskForm(statusHint, editData);
  else if (type === 'reunion') html = buildReunionForm(editData);
  else if (type === 'subproject') html = buildSubprojectForm();
  else if (type === 'planningevent') html = buildPlanningEventForm(editData);
  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('open');
  // Init agenda builder si c'est un formulaire de réunion
  if (type === 'reunion') {
    let items = [];

    try { themes = editData?.agendaThemes ? JSON.parse(editData.agendaThemes) : {}; } catch(e){}
    (editData?.agenda||[]).forEach((txt, i) => items.push({ txt, theme: themes[i]||'autre' }));
    setTimeout(() => initAgendaBuilder(items), 10);
  }
}
function closeModal(e) {
  if (!e || e.target === document.getElementById('modalOverlay')) {
    document.getElementById('modalOverlay').classList.remove('open');

}

    <div class="modal-title">${data ? 'Modifier le projet' : 'Nouveau projet'}</div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Nom</label><input class="form-input" id="f-pname" value="${data?.name||''}" placeholder="Ex: BPJEPS 2025-26"></div>
      <div class="form-group"><label class="form-label">Emoji</label><input class="form-input" id="f-pemoji" value="${data?.emoji||'📋'}" placeholder="🎓"></div>
    </div>
    <div class="form-group"><label class="form-label">Description</label><input class="form-input" id="f-pdesc" value="${data?.desc||''}" placeholder="Décrivez le projet…"></div>
    <div class="form-group"><label class="form-label">Couleur</label><input type="color" class="form-input" id="f-pcolor" value="${data?.color||'#3b82f6'}" style="height:42px;padding:4px"></div>
    <div class="form-group"><label class="form-label">Membres</label><div class="members-select">${pillsHtml(data?.members||[])}</div></div>
    <div class="modal-actions">
      ${data ? `<button class="btn btn-outline" style="color:var(--accent)" onclick="deleteProject('${data.id}')">Supprimer</button>` : ''}
      <button class="btn btn-outline" onclick="closeModal()">Annuler</button>
      <button class="btn btn-primary" onclick="saveProject()">Enregistrer</button>
    </div>`;
}
function buildTaskForm(statusHint, data) {
  const projOpts = state.projects.map(p => `<option value="${p.id}" ${(state.currentProject===p.id||data?.projectId===p.id)?'selected':''}>${p.emoji} ${p.name}</option>`).join('');
  const currentProj = state.projects.find(p => p.id === (data?.projectId || state.currentProject));
  const subOpts = currentProj?.subprojects?.length ? `<option value="">— Aucun —</option>` + currentProj.subprojects.map(s => `<option value="${s.id}" ${data?.subprojectId===s.id?'selected':''}>${s.name}</option>`).join('') : '';
  const memberOpts = MEMBERS.map(m => `<option value="${m.id}" ${data?.assignee===m.id?'selected':''}>${m.name}</option>`).join('');
  const sh = statusHint || data?.status || 'todo';
  return `
    <div class="modal-title">${data ? 'Modifier la tâche' : 'Nouvelle tâche'}</div>
    <div class="form-group"><label class="form-label">Titre</label><input class="form-input" id="f-ttitle" value="${data?.title||''}" placeholder="Décrivez la tâche…"></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Projet</label><select class="form-select" id="f-tproject">${projOpts}</select></div>
      <div class="form-group"><label class="form-label">Assigné à</label><select class="form-select" id="f-tassignee">${memberOpts}</select></div>
    </div>
    ${subOpts ? `<div class="form-group"><label class="form-label">Sous-projet</label><select class="form-select" id="f-tsubproject">${subOpts}</select></div>` : '<input type="hidden" id="f-tsubproject" value="">'}
    <div class="form-row">
      <div class="form-group"><label class="form-label">Date limite</label><input type="date" class="form-input" id="f-tdue" value="${data?.due||''}"></div>
      <div class="form-group"><label class="form-label">Priorité</label>
        <select class="form-select" id="f-tpriority">
          <option value="high" ${data?.priority==='high'?'selected':''}>🔴 Urgent</option>
          <option value="medium" ${(!data||data?.priority==='medium')?'selected':''}>🟡 Moyen</option>
          <option value="low" ${data?.priority==='low'?'selected':''}>🟢 Faible</option>
        </select>
      </div>
    </div>
    <div class="form-group"><label class="form-label">Statut</label>
      <select class="form-select" id="f-tstatus">
        <option value="todo" ${sh==='todo'?'selected':''}>À faire</option>
        <option value="inprogress" ${sh==='inprogress'?'selected':''}>En cours</option>
        <option value="done" ${sh==='done'?'selected':''}>Terminé</option>
      </select>
    </div>
    <div class="form-group"><label class="form-label">Notes</label><textarea class="form-textarea" id="f-tnotes" placeholder="Infos complémentaires…">${data?.notes||''}</textarea></div>
    <div class="modal-actions">
      ${data ? `<button class="btn btn-outline" style="color:var(--accent)" onclick="deleteTask('${data.id}')">Supprimer</button>` : ''}
      <button class="btn btn-outline" onclick="closeModal()">Annuler</button>
      <button class="btn btn-primary" onclick="saveTask()">Enregistrer</button>
    </div>`;
}
// Thématiques dynamiques basées sur les projets
function getThemes() {
  const colors = ['#3b82f6','#8b5cf6','#14b8a6','#f59e0b','#ec4899','#e63946','#6366f1','#f97316','#22c55e','#0ea5e9'];
  const bgs    = ['#eff6ff','#f5f3ff','#f0fdfa','#fffbeb','#fdf2f8','#fff5f5','#eef2ff','#fff7ed','#f0fdf4','#f0f9ff'];
  return state.projects.map((p, i) => ({
    id:    p.id,
    label: p.name,
    color: p.color || colors[i % colors.length],
    bg:    bgs[i % bgs.length],
  }));
}

const THEMES = [
  { id:'bpjeps',         label:'BPJEPS',        color:'#3b82f6', bg:'#eff6ff' },
  { id:'bf',             label:'Brevet Fédéral', color:'#8b5cf6', bg:'#f5f3ff' },
  { id:'detb',           label:'DETB',           color:'#14b8a6', bg:'#f0fdfa' },
  { id:'arbitrage',      label:'Arbitrage',      color:'#f59e0b', bg:'#fffbeb' },
  { id:'communication',  label:'Communication',  color:'#ec4899', bg:'#fdf2f8' },
  { id:'ttbb',           label:'TTBB',           color:'#e63946', bg:'#fff5f5' },
  { id:'autre',          label:'Autre',          color:'#6366f1', bg:'#eef2ff' },
];

function buildReunionForm(data) {
  // Reconstruire les items depuis agenda + agendaThemes
  let items = [];
  let themes = {};
  try { themes = data?.agendaThemes ? JSON.parse(data.agendaThemes) : {}; } catch(e){}
  (data?.agenda||[]).forEach((txt, i) => {
    items.push({ txt, theme: themes[i] || 'autre' });
  });
  const itemsJson = JSON.stringify(items).replace(/"/g, '&quot;');
  return `
    <div class="modal-title">${data ? 'Modifier la réunion' : 'Nouvelle réunion'}</div>
    <div class="form-group"><label class="form-label">Titre</label><input class="form-input" id="f-rtitle" value="${data?.title||''}" placeholder="Ex: Réunion mensuelle IRFBB"></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Date</label><input type="date" class="form-input" id="f-rdate" value="${data?.date||''}"></div>
      <div class="form-group"><label class="form-label">Heure</label><input type="time" class="form-input" id="f-rtime" value="${data?.time||''}"></div>
    </div>
    <div class="form-group"><label class="form-label">Lieu</label><input class="form-input" id="f-rlocation" value="${data?.location||''}" placeholder="Salle, Visio…"></div>
    <div class="form-group">
      <label class="form-label">Ordre du jour</label>
      <div class="agenda-builder" id="agenda-builder"></div>
      <div class="agenda-add-row" style="margin-top:10px">
        ${getThemes().map(t => `<button class="agenda-add-btn" style="border-color:${t.color};color:${t.color}" onclick="addAgendaItem('${t.id}')">+ ${t.label}</button>`).join('')}
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">Annuler</button>
      <button class="btn btn-primary" onclick="saveReunion()">Enregistrer</button>
    </div>`;
}

function renderAgendaBuilder(items) {
  const builder = document.getElementById('agenda-builder');
  if (!builder) return;
  if (!items || !items.length) { builder.innerHTML = '<div style="font-size:13px;color:var(--muted);padding:8px 0">Aucun sujet — ajoutez via les boutons ci-dessous</div>'; return; }
  builder.innerHTML = items.map((item, i) => {
    const themes=getThemes(); const t = themes.find(x => x.id === item.theme) || themes[themes.length-1];
    return `<div class="agenda-item-row" id="aitem-${i}">
      <select onchange="changeAgendaTheme(${i},this.value)" style="border:1px solid ${t.color};background:${t.bg};color:${t.color};border-radius:6px;padding:3px 6px;font-size:11px;font-weight:700;cursor:pointer;flex-shrink:0">
        ${getThemes().map(th => `<option value="${th.id}" ${th.id===item.theme?'selected':''}>${th.label}</option>`).join('')}
      </select>
      <input class="agenda-item-text" value="${item.txt.replace(/"/g,'&quot;')}" placeholder="Décrivez le sujet…" oninput="updateAgendaItem(${i},this.value)">
      <button class="agenda-remove-btn" onclick="removeAgendaItem(${i})" title="Supprimer">✕</button>
    </div>`;
  }).join('');
}

// État temporaire du builder
let _agendaItems = [];

function initAgendaBuilder(items) {
  _agendaItems = items || [];
  renderAgendaBuilder(_agendaItems);
}

// Sauvegarde les valeurs actuelles des inputs avant re-rendu
function syncAgendaInputs() {
  document.querySelectorAll('.agenda-item-text').forEach((input, i) => {
    if (_agendaItems[i]) _agendaItems[i].txt = input.value;
  });
}

function changeAgendaTheme(idx, themeId) {
  syncAgendaInputs();
  if (_agendaItems[idx]) {
    _agendaItems[idx].theme = themeId;
    renderAgendaBuilder(_agendaItems);
  }
}

function addAgendaItem(themeId) {
  syncAgendaInputs();
  _agendaItems.push({ txt: '', theme: themeId });
  renderAgendaBuilder(_agendaItems);
  setTimeout(() => {
    const inputs = document.querySelectorAll('.agenda-item-text');
    if (inputs.length) inputs[inputs.length-1].focus();
  }, 50);
}

function removeAgendaItem(idx) {
  syncAgendaInputs();
  _agendaItems.splice(idx, 1);
  renderAgendaBuilder(_agendaItems);
}

function buildSubprojectForm() {
  return `
    <div class="modal-title">Nouveau sous-projet</div>
    <div class="form-group"><label class="form-label">Nom du sous-projet</label><input class="form-input" id="f-spname" placeholder="Ex: Séminaire de rentrée"></div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">Annuler</button>
      <button class="btn btn-primary" onclick="saveSubproject()">Créer</button>
    </div>`;
}

function buildPlanningEventForm(data) {
  return `
    <div class="modal-title">${data ? 'Modifier l\'événement' : 'Nouvel événement planning'}</div>
    <div class="form-group"><label class="form-label">Titre</label><input class="form-input" id="f-evtitle" value="${data?.title||''}" placeholder="Ex: Séminaire de rentrée, Jury BPJEPS…"></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Date</label><input type="date" class="form-input" id="f-evdate" value="${data?.date||''}"></div>
      <div class="form-group"><label class="form-label">Projet lié (optionnel)</label>
        <select class="form-select" id="f-evproject">
          <option value="">— Aucun —</option>
          ${state.projects.map(p => `<option value="${p.id}" ${data?.projectId===p.id?'selected':''}>${p.emoji} ${p.name}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="form-group"><label class="form-label">Notes</label><textarea class="form-textarea" id="f-evnotes" placeholder="Détails…" style="min-height:60px">${data?.notes||''}</textarea></div>
    <div class="modal-actions">
      ${data ? `<button class="btn btn-outline" style="color:var(--accent)" onclick="deleteEvent('${data.id}')">Supprimer</button>` : ''}
      <button class="btn btn-outline" onclick="closeModal()">Annuler</button>
      <button class="btn btn-primary" onclick="savePlanningEvent()">Enregistrer</button>
    </div>`;
}

async function savePlanningEvent() {
  const title = document.getElementById('f-evtitle').value.trim();
  const date  = document.getElementById('f-evdate').value;
  if (!title || !date) { alert('Le titre et la date sont requis.'); return; }
  if (!state.planningEvents) state.planningEvents = [];
  const existing = _editId ? state.planningEvents.findIndex(e => e.id === _editId) : -1;
  const ev = {
    id: _editId || genId(),
    title,
    date,
    projectId: document.getElementById('f-evproject').value,
    notes: document.getElementById('f-evnotes').value.trim(),
  };
  showLoading(true);
  try {
    await api('saveEvent', { data: ev });
    if (existing >= 0) state.planningEvents[existing] = ev;
    else state.planningEvents.push(ev);
    closeModal();
    renderPlanning();
  } catch(e) { showError(e.message); }
  finally { showLoading(false); }
}

async function deleteEvent(id) {
  if (!confirm('Supprimer cet événement ?')) return;
  showLoading(true);
  try {
    await api('deleteEvent', { id });
    state.planningEvents = (state.planningEvents || []).filter(e => e.id !== id);
    closeModal(); renderPlanning();
  } catch(e) { showError(e.message); }
  finally { showLoading(false); }
}

async function saveSubproject() {
  const name = document.getElementById('f-spname').value.trim();
  if (!name) { alert('Le nom est requis.'); return; }
  const pid = state.currentProject;
  const p = state.projects.find(x => x.id === pid);
  if (!p) return;
  if (!p.subprojects) p.subprojects = [];
  const sp = { id: genId(), name };
  p.subprojects.push(sp);
  showLoading(true);
  try {
    await api('saveProject', { data: p });
    closeModal();
    renderKanban(pid);
  } catch(e) { showError(e.message); }
  finally { showLoading(false); }
}

async function saveProject() {
  const name = document.getElementById('f-pname').value.trim();
  if (!name) { alert('Le nom est requis.'); return; }
  const d = {
    id: _editId || genId(),
    name,
    emoji: document.getElementById('f-pemoji').value || '📋',
    desc: document.getElementById('f-pdesc').value.trim(),
    color: document.getElementById('f-pcolor').value,
    status: 'active',
    members: getSelectedMembers(),
  };
  showLoading(true);
  try {
    await api('saveProject', { data: d });
    if (_editId) {
      const i = state.projects.findIndex(p => p.id === _editId);
      if (i !== -1) state.projects[i] = { ...state.projects[i], ...d };
      else state.projects.push(d);
    } else { state.projects.push(d); }
    closeModal(); renderDashboard();
  } catch(e) { showError(e.message); }
  finally { showLoading(false); }
}

async function saveTask() {
  const title = document.getElementById('f-ttitle').value.trim();
  if (!title) { alert('Le titre est requis.'); return; }
  const d = {
    id: _editId || genId(),
    title,
    projectId: document.getElementById('f-tproject').value,
    subprojectId: document.getElementById('f-tsubproject')?.value || '',
    assignee: document.getElementById('f-tassignee').value,
    due: document.getElementById('f-tdue').value,
    priority: document.getElementById('f-tpriority').value,
    status: document.getElementById('f-tstatus').value,
    notes: document.getElementById('f-tnotes').value.trim(),
  };
  showLoading(true);
  try {
    await api('saveTask', { data: d });
    if (_editId) {
      const i = state.tasks.findIndex(t => t.id === _editId);
      if (i !== -1) state.tasks[i] = d; else state.tasks.push(d);
    } else { state.tasks.push(d); }
    closeModal();
    if (document.getElementById('view-kanban').classList.contains('active')) renderKanban(d.projectId);
    else renderDashboard();
  } catch(e) { showError(e.message); }
  finally { showLoading(false); }
}

async function saveReunion() {
  const title = document.getElementById('f-rtitle').value.trim();
  if (!title) { alert('Le titre est requis.'); return; }
  // Lire depuis le builder
  syncAgendaInputs();
  const validItems = _agendaItems.filter(x => x.txt.trim());
  const agenda = validItems.map(x => x.txt.trim());
  const agendaThemesObj = {};
  validItems.forEach((x, i) => { agendaThemesObj[i] = x.theme; });
  const existing = _editId ? state.reunions.find(r => r.id === _editId) : null;
  // Conserver agendaNotes existantes
  let agendaNotes = existing?.agendaNotes || '';
  const d = {
    id: _editId || genId(),
    title,
    date: document.getElementById('f-rdate').value,
    time: document.getElementById('f-rtime').value,
    location: document.getElementById('f-rlocation').value.trim(),
    agenda,
    agendaThemes: JSON.stringify(agendaThemesObj),
    agendaNotes,
    decisions:      existing?.decisions      || '',
    actions:        existing?.actions        || '',
    nextMeeting:    existing?.nextMeeting    || '',
    paulValidation: existing?.paulValidation || '',
  };
  showLoading(true);
  try {
    await api('saveReunion', { data: d });
    if (_editId) {
      const i = state.reunions.findIndex(r => r.id === _editId);
      if (i !== -1) state.reunions[i] = d; else state.reunions.push(d);
    } else { state.reunions.push(d); }
    closeModal(); renderReunions(); updateNavNextDate();
  } catch(e) { showError(e.message); }
  finally { showLoading(false); }
}

async function deleteProject(id) {
  if (!confirm('Supprimer ce projet et toutes ses tâches ?')) return;
  showLoading(true);
  try {
    await api('deleteProject', { id });
    state.projects = state.projects.filter(p => p.id !== id);
    state.tasks    = state.tasks.filter(t => t.projectId !== id);
    closeModal(); renderDashboard();
  } catch(e) { showError(e.message); }
  finally { showLoading(false); }
}
async function deleteTask(id) {
  if (!confirm('Supprimer cette tâche ?')) return;
  const t = state.tasks.find(x => x.id === id);
  showLoading(true);
  try {
    await api('deleteTask', { id });
    state.tasks = state.tasks.filter(x => x.id !== id);
    closeModal();
    if (t) renderKanban(t.projectId);
  } catch(e) { showError(e.message); }
  finally { showLoading(false); }
}

// INIT
try { state.match = JSON.parse(localStorage.getItem('hdf_match')||'{}'); } catch(e){ state.match={}; }
loadData().then(() => renderDashboard());
// Rafraîchissement auto toutes les 30 secondes
setInterval(async () => {
  if (state.loading) return;
  await loadData();
  const v = document.querySelector('.view.active');
  if (v?.id === 'view-dashboard') renderDashboard();
  else if (v?.id === 'view-kanban' && state.currentProject) renderKanban(state.currentProject);
  else if (v?.id === 'view-reunions') { if (_reunionTab==='match') renderMatchDuMois(); else renderReunions(); }
}, 30000);
